<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#e8f4fd" stroke="#a2d2ff" stroke-width="2"/>
  
  <!-- Face/Head of the kid -->
  <circle cx="50" cy="46" r="22" fill="#ffe5d9"/>
  
  <!-- Hair (Cute brown hair with bangs) -->
  <path d="M28 45c0-12 10-22 22-22s22 10 22 22c0 2-2 3-5 1-2-1.5-5-3-7-1-2 2-5 0-7-2-2 2-5 3-7 1-3-2-6-1-6 1z" fill="#6d4c41"/>
  
  <!-- Cheeks (Blushing pink) -->
  <circle cx="36" cy="51" r="3" fill="#ffafcc" opacity="0.7"/>
  <circle cx="64" cy="51" r="3" fill="#ffafcc" opacity="0.7"/>
  
  <!-- Eyes (Happy curved eyes closed in joy) -->
  <path d="M33 46c1-2 4-2 5 0" stroke="#4a3e3d" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M62 46c1-2 4-2 5 0" stroke="#4a3e3d" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Milk Glass -->
  <rect x="42" y="55" width="16" height="24" rx="2" fill="#ffffff" stroke="#4a3e3d" stroke-width="2" opacity="0.9"/>
  <!-- Milk level inside glass -->
  <rect x="44" y="59" width="12" height="18" rx="1" fill="#f8f9fa"/>
  <!-- Glass highlights -->
  <line x1="45" y1="57" x2="45" y2="76" stroke="#a2d2ff" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Cute hands holding the glass -->
  <circle cx="40" cy="65" r="3" fill="#ffe5d9" stroke="#4a3e3d" stroke-width="1.5"/>
  <circle cx="60" cy="65" r="3" fill="#ffe5d9" stroke="#4a3e3d" stroke-width="1.5"/>
  
  <!-- Straw (Cute pink striped straw) -->
  <path d="M47 48l3 12" stroke="#ff4d6d" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Straw inside glass -->
  <path d="M50 60l2 10" stroke="#ff4d6d" stroke-width="2" opacity="0.7"/>
  
  <!-- Mouth (Smiling, drinking from straw) -->
  <path d="M48 51c1 1 3 1 4 0" stroke="#4a3e3d" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
